version: '3'
services:
  app1:
    build:
      context: .
    hostname: app1
    platform: linux/amd64
    ports:
      - "8080:8080"
    environment:
      PROXY_HOSTNAME: "usgs-landsat.s3.amazonaws.com"
      GROUPCACHE_PEERS: "http://app1:8080,http://app2:8080,http://app3:8080"
    dns:
      - 8.8.8.8
  app2:
    build:
      context: .
    platform: linux/amd64
    hostname: app2
    ports:
      - "8081:8080"
    environment:
      PROXY_HOSTNAME: "usgs-landsat.s3.amazonaws.com"
      GROUPCACHE_PEERS: "http://app2:8080,http://app1:8080,http://app3:8080"
    dns:
      - 8.8.8.8
  app3:
    build:
      context: .
    platform: linux/amd64
    hostname: app3
    ports:
      - "8082:8080"
    environment:
      PROXY_HOSTNAME: "usgs-landsat.s3.amazonaws.com"
      GROUPCACHE_PEERS: "http://app3:8080,http://app1:8080,http://app2:8080"
    dns:
      - 8.8.8.8
  nginx:
    image: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf